name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to package"
        required: true
        default: "0.1.0"

permissions:
  contents: write
  # Build-provenance attestations: verify any asset was built by this
  # repo's CI with `gh attestation verify <file> --repo shivamdoting/wrec`.
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  macos:
    name: macOS release
    runs-on: blacksmith-6vcpu-macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare release metadata
        id: release
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          git fetch origin main --prune

          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            commit="$(git rev-list -n 1 "$GITHUB_REF_NAME")"
            version="${GITHUB_REF_NAME#v}"

            if ! git merge-base --is-ancestor "$commit" origin/main; then
              echo "::error::Tag $GITHUB_REF_NAME points to $commit, which is not on origin/main."
              exit 1
            fi
          else
            commit="$(git rev-parse HEAD)"
            version="${INPUT_VERSION#v}"

            if ! git merge-base --is-ancestor "$commit" origin/main; then
              echo "::error::Manual release rehearsal must run from a commit on origin/main."
              exit 1
            fi
          fi

          echo "commit=$commit" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Show toolchain versions
        run: |
          rustc --version
          cargo --version
          swiftc --version
          xcodebuild -version

      - name: Prepare Xcode Metal toolchain
        run: |
          set -euo pipefail

          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          if ! xcrun -f metal >/dev/null 2>&1; then
            xcodebuild -downloadComponent MetalToolchain
          fi
          xcrun -f metal

      - name: Check
        run: |
          cargo fmt --check
          cargo check
          cargo test
          swift test --package-path apps/mac

      # CI runners have no Screen Recording permission, so the bench runs on a
      # real Mac before tagging (`bun run bench release --against <previous>`)
      # and commits its summary to benchmarks/results/. This step refuses to
      # release code that was never benched: the newest clean, passing release
      # summary must cover a commit whose only difference from the release
      # commit is the benchmarks/ directory itself.
      - name: Verify release bench
        id: bench
        run: |
          set -euo pipefail

          release_commit="${{ steps.release.outputs.commit }}"
          picked=""
          for file in $(ls -r benchmarks/results/*.json 2>/dev/null); do
            suite=$(jq -r '.suite' "$file")
            status=$(jq -r '.status' "$file")
            dirty=$(jq -r '.git.dirty' "$file")
            benched=$(jq -r '.git.commit' "$file")

            [[ "$suite" == "release" && "$status" == "pass" && "$dirty" == "false" ]] || continue
            git cat-file -e "$benched" 2>/dev/null || continue
            git merge-base --is-ancestor "$benched" "$release_commit" || continue

            non_bench_diff=$(git diff --name-only "$benched" "$release_commit" -- . ':!benchmarks' | head -5)
            if [[ -n "$non_bench_diff" ]]; then
              echo "skipping $file: code changed since benched commit $benched:"
              echo "$non_bench_diff"
              continue
            fi

            picked="$file"
            break
          done

          if [[ -z "$picked" ]]; then
            echo "::error::No passing release bench found for this code. Run 'bun run bench release --against <previous wrec>' on a Mac, commit benchmarks/results/, then tag."
            exit 1
          fi

          echo "using bench summary: $picked"
          echo "summary=$picked" >> "$GITHUB_OUTPUT"

      # The rendered UI lives at wrec.app/benchmarks; releases carry the data.
      - name: Publish bench artifacts
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          mkdir -p dist/bench
          cp "${{ steps.bench.outputs.summary }}" "dist/bench/wrec-bench-$VERSION.json"

      - name: Package unsigned DMG
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: ./scripts/package-macos.sh release

      - name: Package CLI runtime
        run: ./scripts/package-cli-macos.sh release

      - name: Archive app bundle for in-place updates
        run: |
          set -euo pipefail

          case "$(uname -m)" in
            arm64) target="aarch64-apple-darwin" ;;
            x86_64) target="x86_64-apple-darwin" ;;
            *) echo "unsupported architecture: $(uname -m)" >&2; exit 1 ;;
          esac

          tar -C dist/release -czf "dist/release/wrec-app-$target.tar.gz" "Wrec.app"

      - name: Verify artifacts
        run: |
          set -euo pipefail

          case "$(uname -m)" in
            arm64) target="aarch64-apple-darwin" ;;
            x86_64) target="x86_64-apple-darwin" ;;
            *) echo "unsupported architecture: $(uname -m)" >&2; exit 1 ;;
          esac

          dmg="dist/release/wrec-${{ steps.release.outputs.version }}.dmg"
          cli_archive="dist/cli/wrec-cli-$target.tar.gz"
          app_archive="dist/release/wrec-app-$target.tar.gz"

          test -f "$dmg"
          test -f "$cli_archive"
          test -f "$app_archive"
          codesign --verify --deep --strict --verbose=2 "dist/release/Wrec.app"
          tar -tzf "$app_archive" | grep -qx 'Wrec.app/Contents/MacOS/wrec-app'
          tar -tzf "$cli_archive" | grep -qx 'wrec-cli/wrec'
          tar -tzf "$cli_archive" | grep -qx 'wrec-cli/daemon'
          tar -tzf "$cli_archive" | grep -qx 'wrec-cli/capture-engine'

          mount_dir="$(mktemp -d)"
          trap 'hdiutil detach "$mount_dir" >/dev/null 2>&1 || true; rmdir "$mount_dir" >/dev/null 2>&1 || true' EXIT
          hdiutil attach "$dmg" -nobrowse -readonly -mountpoint "$mount_dir"
          test -d "$mount_dir/Wrec.app"
          test -L "$mount_dir/Applications"
          test "$(readlink "$mount_dir/Applications")" = "/Applications"
          codesign --verify --deep --strict --verbose=2 "$mount_dir/Wrec.app"
          hdiutil detach "$mount_dir"
          rmdir "$mount_dir"

      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail

          # Bare filenames, matching how the assets appear on the release,
          # so `shasum -a 256 -c SHA256SUMS` works from a download folder.
          {
            (cd dist/release && shasum -a 256 ./*.dmg ./*.tar.gz | sed 's|\./||')
            (cd dist/cli && shasum -a 256 ./*.tar.gz | sed 's|\./||')
          } > SHA256SUMS
          cat SHA256SUMS

      - name: Attest build provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/release/*.dmg
            dist/release/*.tar.gz
            dist/cli/*.tar.gz
            SHA256SUMS

      - name: Publish GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh release create "$GITHUB_REF_NAME" \
            dist/release/*.dmg \
            dist/release/*.tar.gz \
            dist/cli/*.tar.gz \
            dist/bench/* \
            SHA256SUMS \
            --target "${{ steps.release.outputs.commit }}" \
            --title "$GITHUB_REF_NAME" \
            --notes "macOS build for $GITHUB_REF_NAME. Builds are not notarized: install the CLI with \`curl -fsSL https://wrec.app/install | sh\` to avoid the Gatekeeper warning. For the app, macOS blocks the first launch — clear the quarantine recursively with \`xattr -dr com.apple.quarantine /Applications/Wrec.app\` (the bundled helpers are quarantined separately) or approve it in System Settings > Privacy & Security." \
            --verify-tag
