<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="wrec architecture: the app and CLI talk through an IPC client over a Unix socket to the daemon, which drives the macOS recorder and the Swift capture engine (ScreenCaptureKit to AVAssetWriter to .mov)" font-family="'Geist Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#e6e6e6" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="600" rx="10" fill="#0b0b0b" />

  <!-- User Interfaces & Core -->
  <g>
    <rect x="50" y="42" width="380" height="186" rx="3" fill="#9c3f98" stroke="#d9d9d9" stroke-width="1.5" />
    <text x="240" y="72" text-anchor="middle" font-size="19" fill="#f3e8f3">User Interfaces &amp; Core</text>
    <rect x="170" y="88" width="140" height="42" rx="2" fill="none" stroke="#efe7ef" stroke-width="1.5" />
    <text x="240" y="114" text-anchor="middle" font-size="16" fill="#f3e8f3">Core Types</text>
    <path d="M212 130 C 200 146, 172 150, 156 164" fill="none" stroke="#efe7ef" stroke-width="1.8" marker-end="url(#arrow)" />
    <path d="M268 130 C 280 146, 308 150, 324 164" fill="none" stroke="#efe7ef" stroke-width="1.8" marker-end="url(#arrow)" />
    <rect x="68" y="166" width="168" height="42" rx="2" fill="none" stroke="#efe7ef" stroke-width="1.5" />
    <text x="152" y="192" text-anchor="middle" font-size="16" fill="#f3e8f3">wrec-app (GPUI)</text>
    <rect x="256" y="166" width="148" height="42" rx="2" fill="none" stroke="#efe7ef" stroke-width="1.5" />
    <text x="330" y="192" text-anchor="middle" font-size="16" fill="#f3e8f3">wrec CLI</text>
  </g>

  <!-- Communication -->
  <g>
    <rect x="85" y="288" width="290" height="232" rx="3" fill="#54539a" stroke="#d9d9d9" stroke-width="1.5" />
    <path d="M152 208 C 152 262, 172 304, 206 330" fill="none" stroke="#e6e6e6" stroke-width="1.8" marker-end="url(#arrow)" />
    <path d="M330 208 C 330 262, 288 304, 256 330" fill="none" stroke="#e6e6e6" stroke-width="1.8" marker-end="url(#arrow)" />
    <text x="230" y="318" text-anchor="middle" font-size="19" fill="#eaeaf6">Communication</text>
    <rect x="160" y="334" width="140" height="42" rx="2" fill="none" stroke="#e8e8f2" stroke-width="1.5" />
    <text x="230" y="360" text-anchor="middle" font-size="16" fill="#eaeaf6">IPC Client</text>
    <path d="M230 376 L230 400" fill="none" stroke="#e8e8f2" stroke-width="1.8" marker-end="url(#arrow)" />
    <circle cx="230" cy="452" r="48" fill="#0b0b0b" stroke="#d9d9d9" stroke-width="1.5" />
    <text x="230" y="448" text-anchor="middle" font-size="16" fill="#ececec">Unix</text>
    <text x="230" y="470" text-anchor="middle" font-size="16" fill="#ececec">Socket</text>
  </g>

  <path d="M386 424 L450 424" fill="none" stroke="#e6e6e6" stroke-width="2.5" stroke-dasharray="7 7" marker-end="url(#arrow)" />

  <!-- Backend Services -->
  <g>
    <rect x="465" y="330" width="290" height="188" rx="3" fill="#0c2a10" stroke="#d9d9d9" stroke-width="1.5" />
    <text x="610" y="360" text-anchor="middle" font-size="19" fill="#e2ece2">Backend Services</text>
    <rect x="492" y="376" width="236" height="42" rx="2" fill="none" stroke="#dfe8df" stroke-width="1.5" />
    <text x="610" y="402" text-anchor="middle" font-size="16" fill="#e2ece2">Daemon (Queue/Jobs)</text>
    <path d="M610 418 L610 448" fill="none" stroke="#dfe8df" stroke-width="1.8" marker-end="url(#arrow)" />
    <rect x="512" y="452" width="196" height="42" rx="2" fill="none" stroke="#dfe8df" stroke-width="1.5" />
    <text x="610" y="478" text-anchor="middle" font-size="16" fill="#e2ece2">macOS Recorder</text>
  </g>

  <path d="M766 424 L830 424" fill="none" stroke="#e6e6e6" stroke-width="2.5" stroke-dasharray="7 7" marker-end="url(#arrow)" />

  <!-- Media Engine -->
  <g>
    <rect x="845" y="112" width="290" height="436" rx="3" fill="#0e0e0e" stroke="#d9d9d9" stroke-width="1.5" />
    <text x="990" y="142" text-anchor="middle" font-size="19" fill="#e8e8e8">Media Engine</text>
    <rect x="885" y="162" width="210" height="42" rx="2" fill="#151515" stroke="#dcdcdc" stroke-width="1.5" />
    <text x="990" y="188" text-anchor="middle" font-size="16" fill="#ececec">Capture Engine</text>
    <path d="M990 204 L990 258" fill="none" stroke="#dcdcdc" stroke-width="1.8" marker-end="url(#arrow)" />
    <rect x="885" y="262" width="210" height="42" rx="2" fill="#151515" stroke="#dcdcdc" stroke-width="1.5" />
    <text x="990" y="288" text-anchor="middle" font-size="16" fill="#ececec">ScreenCaptureKit</text>
    <path d="M990 304 L990 358" fill="none" stroke="#dcdcdc" stroke-width="1.8" marker-end="url(#arrow)" />
    <rect x="885" y="362" width="210" height="42" rx="2" fill="#151515" stroke="#dcdcdc" stroke-width="1.5" />
    <text x="990" y="388" text-anchor="middle" font-size="16" fill="#ececec">AVAssetWriter</text>
    <path d="M990 404 L990 458" fill="none" stroke="#dcdcdc" stroke-width="1.8" marker-end="url(#arrow)" />
    <rect x="885" y="462" width="210" height="42" rx="2" fill="#262626" stroke="#dcdcdc" stroke-width="1.5" />
    <text x="990" y="488" text-anchor="middle" font-size="16" fill="#ececec">.mov File</text>
  </g>
</svg>
